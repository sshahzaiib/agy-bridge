# Smithery registry config — https://smithery.ai/docs
# agy-bridge needs no secrets: agy authenticates via its own CLI login.
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      agyPath:
        type: string
        description: "Path to the agy binary (defaults to `agy` on PATH)"
      agyOnFailure:
        type: string
        enum: ["fallback", "strict"]
        description: "strict tells the calling agent not to absorb failed delegations"
      agyTimeout:
        type: number
        description: "Override the per-tool timeouts, in seconds"
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'agy-bridge'],
      env: {
        ...(config.agyPath ? { AGY_PATH: config.agyPath } : {}),
        ...(config.agyOnFailure ? { AGY_ON_FAILURE: config.agyOnFailure } : {}),
        ...(config.agyTimeout ? { AGY_TIMEOUT: String(config.agyTimeout) } : {})
      }
    })
